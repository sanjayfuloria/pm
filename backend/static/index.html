<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM MVP Backend Hello</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(120deg, #f7fbff 0%, #eef4ff 100%);
        color: #032147;
      }
      main {
        width: min(720px, 92vw);
        background: #ffffff;
        border: 1px solid rgba(3, 33, 71, 0.12);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(3, 33, 71, 0.12);
      }
      h1 {
        margin-top: 0;
      }
      pre {
        background: #f7f8fb;
        border-radius: 8px;
        border: 1px solid rgba(3, 33, 71, 0.08);
        padding: 12px;
        overflow: auto;
      }
      .muted {
        color: #555;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello world from FastAPI</h1>
      <p class="muted">This confirms the static page is served at /.</p>
      <h2>API call result</h2>
      <pre id="api-output">Loading...</pre>
    </main>
    <script>
      fetch('/api/hello')
        .then((response) => response.json())
        .then((data) => {
          document.getElementById('api-output').textContent = JSON.stringify(data, null, 2);
        })
        .catch((error) => {
          document.getElementById('api-output').textContent = String(error);
        });
    </script>
  </body>
</html>
